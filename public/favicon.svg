<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C62828;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Code brackets symbol -->
  <path d="M 30 35 L 20 50 L 30 65" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 70 35 L 80 50 L 70 65" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Forward slash in the middle -->
  <line x1="45" y1="65" x2="55" y2="35" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Small accent dots for tech feel -->
  <circle cx="50" cy="20" r="2" fill="white" opacity="0.6"/>
  <circle cx="50" cy="80" r="2" fill="white" opacity="0.6"/>
</svg>
