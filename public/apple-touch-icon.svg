<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c1121f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="180" height="180" rx="36" ry="36" fill="url(#bgGrad)"/>

  <!-- Shield shape -->
  <path d="M90 20 L148 44 L148 96 Q148 136 90 160 Q32 136 32 96 L32 44 Z"
        fill="url(#redGrad)" opacity="0.12"/>
  <path d="M90 26 L142 48 L142 96 Q142 132 90 154 Q38 132 38 96 L38 48 Z"
        fill="none" stroke="#E63946" stroke-width="3" opacity="0.5"/>

  <!-- Letter L - white -->
  <text x="28" y="128"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-weight="900"
        font-size="82"
        fill="white"
        filter="url(#glow)">L</text>

  <!-- Letter G - red -->
  <text x="90" y="128"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-weight="900"
        font-size="82"
        fill="#E63946"
        filter="url(#glow)">G</text>

  <!-- Lock icon bottom right -->
  <g transform="translate(118, 112)" opacity="0.95">
    <rect x="0" y="9" width="22" height="17" rx="3" fill="#E63946"/>
    <path d="M3 9 L3 5 Q11 -2 19 5 L19 9" fill="none" stroke="#E63946" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="11" cy="17" r="3" fill="#1a1a2e"/>
    <rect x="9.5" y="18" width="3" height="4" rx="1" fill="#1a1a2e"/>
  </g>

  <!-- Corner accent dots -->
  <circle cx="22" cy="22" r="4" fill="#E63946" opacity="0.5"/>
  <circle cx="158" cy="22" r="4" fill="#E63946" opacity="0.5"/>
  <circle cx="22" cy="158" r="4" fill="#E63946" opacity="0.5"/>
  <circle cx="158" cy="158" r="4" fill="#E63946" opacity="0.5"/>

  <!-- Border -->
  <rect x="0" y="0" width="180" height="180" rx="36" ry="36"
        fill="none" stroke="#E63946" stroke-width="3" opacity="0.35"/>
</svg>
